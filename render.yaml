services:
  - type: web
    name: ai-resume-analyzer
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn api:app -b 0.0.0.0:$PORT -w 1 -k uvicorn.workers.UvicornWorker --timeout 300"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENROUTER_API_KEY
        sync: false
